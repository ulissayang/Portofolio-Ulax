<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Ulis Leuwol</title>

    <!-- ══ CRITICAL: Inline style agar splash muncul SEBELUM JS load ══ -->
    <!-- Mencegah flash putih dan splash terlambat -->
    <style>
      /* Reset & base */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* Body background saat loading */
      body {
        background: #f8fafc;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* Root tersembunyi sampai React siap */
      #root { opacity: 0; transition: opacity 0.4s ease; }
      #root.ready { opacity: 1; }

      /* ══ SPLASH SCREEN ══ */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 0;
        background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 45%, #1d4ed8 100%);
        opacity: 1;
        visibility: visible;
        transition: opacity 0.55s ease, visibility 0.55s ease;
      }

      #splash.out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Lingkaran dekorasi belakang */
      #splash::before {
        content: '';
        position: absolute;
        width: 400px; height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(96,165,250,0.15), transparent 70%);
        top: -100px; right: -100px;
        pointer-events: none;
      }
      #splash::after {
        content: '';
        position: absolute;
        width: 300px; height: 300px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(52,211,153,0.12), transparent 70%);
        bottom: -80px; left: -80px;
        pointer-events: none;
      }

      /* Logo */
      .sp-logo {
        font-size: 2.8rem;
        font-weight: 900;
        color: #fff;
        letter-spacing: -1.5px;
        line-height: 1;
        animation: sp-pop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
      }
      .sp-logo span { color: #60a5fa; }

      /* Tagline */
      .sp-sub {
        font-size: 0.7rem;
        font-weight: 700;
        color: rgba(255,255,255,0.45);
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-top: 8px;
        animation: sp-fade 0.4s 0.2s ease both;
      }

      /* Divider */
      .sp-divider {
        width: 48px; height: 2px;
        background: linear-gradient(90deg, #60a5fa, #34d399);
        border-radius: 99px;
        margin: 24px 0 20px;
        animation: sp-fade 0.4s 0.3s ease both;
      }

      /* Progress bar */
      .sp-bar-wrap {
        width: 180px; height: 3px;
        background: rgba(255,255,255,0.12);
        border-radius: 99px;
        overflow: hidden;
        animation: sp-fade 0.4s 0.3s ease both;
      }
      .sp-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #818cf8, #34d399);
        border-radius: 99px;
        animation: sp-prog 1.5s 0.35s cubic-bezier(0.4,0,0.15,1) forwards;
      }

      /* Dots */
      .sp-dots {
        display: flex; gap: 7px;
        margin-top: 18px;
        animation: sp-fade 0.4s 0.4s ease both;
      }
      .sp-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: rgba(255,255,255,0.35);
      }
      .sp-dot:nth-child(1) { animation: sp-bounce 1s 0.5s ease infinite; }
      .sp-dot:nth-child(2) { animation: sp-bounce 1s 0.65s ease infinite; }
      .sp-dot:nth-child(3) { animation: sp-bounce 1s 0.8s ease infinite; }

      /* Loading text */
      .sp-loading {
        font-size: 0.65rem;
        color: rgba(255,255,255,0.3);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 10px;
        animation: sp-fade 0.4s 0.5s ease both;
      }

      @keyframes sp-pop {
        from { transform: scale(0.75) translateY(16px); opacity: 0; }
        to   { transform: scale(1) translateY(0); opacity: 1; }
      }
      @keyframes sp-fade {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes sp-prog {
        from { width: 0%; }
        to   { width: 100%; }
      }
      @keyframes sp-bounce {
        0%, 100% { transform: translateY(0); opacity: 0.35; background: rgba(255,255,255,0.35); }
        50%       { transform: translateY(-6px); opacity: 1; background: #60a5fa; }
      }

      /* ══ PAGE FADE IN ══ */
      @keyframes pg-enter {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .pg-enter { animation: pg-enter 0.45s ease forwards; }
    </style>


  </head>
  <body>

    <!-- ══ SPLASH SCREEN — muncul langsung, sebelum JS apapun ══ -->
    <div id="splash">
      <div class="sp-logo">ULIS.<span>PORTFOLIO</span></div>
      <div class="sp-sub">Portfolio</div>
      <div class="sp-divider"></div>
      <div class="sp-bar-wrap">
        <div class="sp-bar"></div>
      </div>
      <div class="sp-dots">
        <div class="sp-dot"></div>
        <div class="sp-dot"></div>
        <div class="sp-dot"></div>
      </div>
      <div class="sp-loading">Memuat halaman...</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
